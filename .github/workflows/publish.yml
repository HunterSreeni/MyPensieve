name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (for better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome check src/ tests/

      - name: Full test suite
        run: npx vitest run

  publish:
    name: Publish (Trusted Publishing + provenance)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC for npm Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (for better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Setup Node.js (Node 24 ships with npm 11+ for Trusted Publishing)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish with provenance (Trusted Publishing - no token needed)
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN / NPM_TOKEN needed!
        # Authentication handled via OIDC + Trusted Publishing.
        # Provenance attestation is auto-generated.

  publish-gpr:
    name: Publish to GitHub Packages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (for better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@huntersreeni'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name="@huntersreeni/mypensieve"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
